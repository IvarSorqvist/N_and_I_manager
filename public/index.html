<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>N_and_I_manager</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">N_and_I_manager</p>
          <h1>N_and_I_manager</h1>
        </div>
        <div class="status-pill" id="syncStatus">Local</div>
      </header>

      <nav class="tabs" aria-label="Dashboard sections">
        <button class="tab active" type="button" data-tab="todos">TODOs</button>
        <button class="tab" type="button" data-tab="calendar" disabled>Calendar</button>
        <button class="tab" type="button" data-tab="notes" disabled>Notes</button>
        <button class="tab" type="button" data-tab="economy" disabled>Economy</button>
      </nav>

      <main>
        <section class="panel" id="todosPanel" aria-labelledby="todosTitle">
          <div class="panel-header">
            <div>
              <h2 id="todosTitle">Shared TODOs</h2>
              <p>Tasks everyone in the household should be able to see, update, and finish.</p>
            </div>
            <div class="counter" id="todoCounter">0 open</div>
          </div>

          <form class="todo-form" id="todoForm">
            <label>
              Task
              <input id="titleInput" name="title" type="text" autocomplete="off" placeholder="Action" required />
            </label>
            <label>
              Owner
              <select id="ownerInput" name="owner">
                <option value="">No owner</option>
                <option>Ivar</option>
                <option>Nomeny</option>
              </select>
            </label>
            <label>
              Due
              <input id="dueDateInput" name="dueDate" type="date" />
            </label>
            <label>
              Priority
              <select id="priorityInput" name="priority">
                <option value="">No priority</option>
                <option>Medium</option>
                <option>High</option>
                <option>Low</option>
              </select>
            </label>
            <label>
              Category
              <select id="categoryInput" name="category">
                <option value="">No category</option>
                <option value="home">home</option>
                <option value="family">family</option>
                <option value="vacation">vacation</option>
                <option value="economy">economy</option>
                <option value="admin">admin</option>
              </select>
            </label>
            <label class="description-field">
              Description
              <textarea id="descriptionInput" name="description" autocomplete="off" placeholder="Optional details"></textarea>
            </label>
            <button type="submit">Add TODO</button>
          </form>

          <div class="toolbar">
            <input id="searchInput" class="search" type="search" placeholder="Search TODOs" />
            <select id="ownerFilter" class="board-control" aria-label="Filter by owner">
              <option value="all">All owners</option>
              <option value="">No owner</option>
              <option>Ivar</option>
              <option>Nomeny</option>
            </select>
            <select id="priorityFilter" class="board-control" aria-label="Filter by priority">
              <option value="all">All priorities</option>
              <option value="">No priority</option>
              <option>High</option>
              <option>Medium</option>
              <option>Low</option>
            </select>
            <select id="categoryFilter" class="board-control" aria-label="Filter by category">
              <option value="all">All categories</option>
              <option value="">No category</option>
              <option value="home">home</option>
              <option value="family">family</option>
              <option value="vacation">vacation</option>
              <option value="economy">economy</option>
              <option value="admin">admin</option>
            </select>
            <select id="sortSelect" class="board-control" aria-label="Sort cards">
              <option value="created">Sort: newest</option>
              <option value="priority">Sort: priority</option>
              <option value="dueDate">Sort: due date</option>
            </select>
          </div>

          <div class="kanban-board" id="todoBoard" aria-label="TODO Kanban board"></div>
          <div class="empty-state" id="emptyState" hidden>No TODOs match this view.</div>
        </section>
      </main>
    </div>

    <template id="todoTemplate">
      <article class="todo-item" draggable="true" tabindex="0">
        <div class="todo-content">
          <div class="todo-mainline">
            <h3 class="todo-title"></h3>
          </div>
          <div class="todo-tags"></div>
          <form class="todo-edit-form" hidden>
            <label>
              Task
              <input class="edit-title" name="title" type="text" autocomplete="off" required />
            </label>
            <label>
              Owner
              <select class="edit-owner" name="owner">
                <option value="">No owner</option>
                <option>Ivar</option>
                <option>Nomeny</option>
              </select>
            </label>
            <label>
              Due
              <input class="edit-due-date" name="dueDate" type="date" />
            </label>
            <label>
              Priority
              <select class="edit-priority" name="priority">
                <option value="">No priority</option>
                <option>Medium</option>
                <option>High</option>
                <option>Low</option>
              </select>
            </label>
            <label>
              Category
              <select class="edit-category" name="category">
                <option value="">No category</option>
                <option value="home">home</option>
                <option value="family">family</option>
                <option value="vacation">vacation</option>
                <option value="economy">economy</option>
                <option value="admin">admin</option>
              </select>
            </label>
            <label class="edit-description-field">
              Description
              <textarea class="edit-description" name="description" autocomplete="off"></textarea>
            </label>
            <div class="edit-actions">
              <button class="delete-button" type="button" aria-label="Delete TODO">Delete</button>
              <button class="save-button" type="submit">Save</button>
              <button class="cancel-button" type="button">Cancel</button>
            </div>
          </form>
        </div>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
