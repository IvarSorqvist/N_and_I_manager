<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>N_and_I_manager</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">N_and_I_manager</p>
          <h1>Shared home dashboard</h1>
        </div>
        <div class="status-pill" id="syncStatus">Local</div>
      </header>

      <nav class="tabs" aria-label="N_and_I_manager sections">
        <button class="tab active" type="button" data-tab="todos">TODOs</button>
        <button class="tab" type="button" data-tab="calendar" disabled>Calendar</button>
        <button class="tab" type="button" data-tab="notes" disabled>Notes</button>
        <button class="tab" type="button" data-tab="economy" disabled>Economy</button>
      </nav>

      <main>
        <section class="panel" id="todosPanel" aria-labelledby="todosTitle">
          <div class="panel-header">
            <div>
              <h2 id="todosTitle">Shared TODOs</h2>
              <p>Tasks everyone in the household should be able to see, update, and finish.</p>
            </div>
            <div class="counter" id="todoCounter">0 open</div>
          </div>

          <form class="todo-form" id="todoForm">
            <label>
              Task
              <input id="titleInput" name="title" type="text" autocomplete="off" placeholder="Return package before Sunday" required />
            </label>
            <label>
              Owner
              <input id="ownerInput" name="owner" type="text" autocomplete="off" placeholder="Family" />
            </label>
            <label>
              Due
              <input id="dueDateInput" name="dueDate" type="date" />
            </label>
            <label class="notes-field">
              Notes
              <input id="notesInput" name="notes" type="text" autocomplete="off" placeholder="Optional details" />
            </label>
            <button type="submit">Add TODO</button>
          </form>

          <div class="toolbar">
            <div class="segmented" aria-label="TODO filter">
              <button class="filter active" type="button" data-filter="all">All</button>
              <button class="filter" type="button" data-filter="open">Open</button>
              <button class="filter" type="button" data-filter="done">Done</button>
            </div>
            <input id="searchInput" class="search" type="search" placeholder="Search TODOs" />
          </div>

          <div class="todo-list" id="todoList"></div>
          <div class="empty-state" id="emptyState" hidden>No TODOs match this view.</div>
        </section>
      </main>
    </div>

    <template id="todoTemplate">
      <article class="todo-item">
        <label class="check-wrap">
          <input class="todo-check" type="checkbox" />
          <span></span>
        </label>
        <div class="todo-content">
          <div class="todo-mainline">
            <h3 class="todo-title"></h3>
            <div class="todo-meta"></div>
          </div>
          <p class="todo-notes"></p>
        </div>
        <button class="delete-button" type="button" aria-label="Delete TODO">Delete</button>
      </article>
    </template>

    <script src="/app.js" type="module"></script>
  </body>
</html>
