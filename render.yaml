services:
  - type: web
    name: n-and-i-manager
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: n-and-i-manager-db
          property: connectionString

databases:
  - name: n-and-i-manager-db
    databaseName: n_and_i_manager
    user: n_and_i_manager
    plan: free
    region: frankfurt
    postgresMajorVersion: "18"
    ipAllowList: []
